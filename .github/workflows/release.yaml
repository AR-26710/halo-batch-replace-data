name: Release GUI

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: gui.exe
            asset_name: gui-windows-${{ github.event.release.tag_name }}.exe
            noconsole: false
          - os: windows-latest
            artifact_name: gui-noconsole.exe
            asset_name: gui-windows-noconsole-${{ github.event.release.tag_name }}.exe
            noconsole: true
          - os: macos-latest
            artifact_name: gui
            asset_name: gui-macos-${{ github.event.release.tag_name }}
            noconsole: false
          - os: macos-latest
            artifact_name: gui-noconsole
            asset_name: gui-macos-noconsole-${{ github.event.release.tag_name }}
            noconsole: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build with PyInstaller (console)
      if: matrix.noconsole == false
      run: pyinstaller --onefile --name gui gui.py

    - name: Build with PyInstaller (noconsole)
      if: matrix.noconsole == true
      run: pyinstaller --onefile --noconsole --name gui-noconsole gui.py

    - name: Rename artifact for platform
      shell: bash
      run: |
        mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        name: ${{ github.event.release.name }}
        files: dist/${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
